name: Checks

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bunx biome ci .
      # e2e is gated behind RUN_E2E (needs ChatGPT OAuth + real generations), so this runs unit tests only.
      - run: bun test
